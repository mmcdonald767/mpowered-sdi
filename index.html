<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: { 900: '#0f1117', 800: '#171b26', 700: '#1e2335', 600: '#252c42', 500: '#2e3650' },
            accent: { DEFAULT: '#6c8fff', soft: '#3b5bdb', glow: 'rgba(108,143,255,0.18)' },
            success: '#34d399',
          },
          fontFamily: {
            sans: ['"Inter"', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          boxShadow: {
            panel: '0 4px 32px 0 rgba(0,0,0,0.45)',
            glow:  '0 0 0 3px rgba(108,143,255,0.35)',
          },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { background-color: #0f1117; color: #e2e8f8; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #171b26; }
    ::-webkit-scrollbar-thumb { background: #2e3650; border-radius: 3px; }

    /* Nav */
    .site-header { background: #171b26; border-bottom: 1px solid #1e2335; position: sticky; top: 0; z-index: 50; }
    .site-header-inner { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; gap: 1.5rem; }
    .site-brand { display: inline-flex; align-items: center; gap: 0.55rem; font-size: 0.95rem; font-weight: 700; color: #e8ecf4; white-space: nowrap; flex-shrink: 0; text-decoration: none; }
    .site-logo-fallback { width: 28px; height: 28px; border-radius: 7px; background: linear-gradient(135deg,#3b5bdb 0%,#6c8fff 100%); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: 'Inter', sans-serif; font-size: 0.75rem; font-weight: 800; color: #fff; letter-spacing: -0.02em; }
    .site-nav { display: flex; align-items: center; gap: 0.25rem; overflow-x: auto; scrollbar-width: none; }
    .site-nav::-webkit-scrollbar { display: none; }
    .nav-link { font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; font-weight: 600; color: #7d8fb3; text-decoration: none; padding: 0.35rem 0.8rem; border-radius: 6px; transition: color 0.13s, background 0.13s; flex-shrink: 0; }
    .nav-link:hover { color: #e8ecf4; background: rgba(255,255,255,0.05); }
    .nav-link.active { color: #6c8fff; background: rgba(108,143,255,0.1); box-shadow: inset 0 0 0 1px rgba(108,143,255,0.35); }
    .nav-divider { width: 1px; height: 18px; background: #252c42; margin: 0 0.5rem; flex-shrink: 0; }
    .btn-ghost { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; font-weight: 600; color: #7d8fb3; background: transparent; border: 1px solid #252c42; border-radius: 6px; padding: 0.35rem 0.9rem; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: color 0.13s, border-color 0.13s, background 0.13s; }
    .btn-ghost:hover { color: #f87171; border-color: rgba(248,113,113,0.45); background: rgba(248,113,113,0.06); }
    @media (max-width: 760px) { .site-brand-text { display: none; } }
    .page-identity-bar { background: #171b26; border-bottom: 1px solid #1e2335; }
    .page-identity-inner { max-width: 1280px; margin: 0 auto; padding: 0.65rem 1.5rem; display: flex; align-items: center; gap: 0.75rem; }
    
    /* ... (rest of your existing styles) ... */
  </style>
</head>
<body class="bg-surface-900 text-slate-100 font-sans antialiased min-h-screen">

  <header class="site-header" role="banner">
    <div class="site-header-inner">
      <a href="https://www.mpowerededucation.com/dashboard.html" class="site-brand" title="M-Powered dashboard">
        <span class="site-logo-fallback">M</span>
        <span class="site-brand-text">M-Powered Education</span>
      </a>
      <nav class="site-nav" aria-label="M-Powered workspaces">
        <a href="https://iep.mpowerededucation.com/" class="nav-link" data-subdomain="iep">Goal Architect</a>
        <a href="https://sdi.mpowerededucation.com/" class="nav-link" data-subdomain="sdi">SDI Engine</a>
        <a href="https://data.mpowerededucation.com/" class="nav-link" data-subdomain="data">Data Utility</a>
        <a href="https://caseload.mpowerededucation.com/" class="nav-link" data-subdomain="caseload">Caseload</a>
        <div class="nav-divider" role="separator" aria-hidden="true"></div>
        <a href="#" class="nav-link" id="nav-profile" title="Profile — coming soon">Profile</a>
        <button type="button" class="btn-ghost" onclick="logout()" aria-label="Sign out">Sign Out</button>
      </nav>
    </div>
  </header>

  <script>
    (function () {
      'use strict';
      var sub = window.location.hostname.split('.')[0];
      var links = document.querySelectorAll('.site-nav .nav-link[data-subdomain]');
      for (var i = 0; i < links.length; i++) {
        if (links[i].getAttribute('data-subdomain') === sub) {
          links[i].classList.add('active');
          links[i].setAttribute('aria-current', 'page');
        }
      }
    })();
    function logout() {
      try { sessionStorage.clear(); } catch (e) {}
      document.cookie = 'mp_session=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; domain=.mpowerededucation.com; Secure; SameSite=Lax';
      window.location.href = 'https://www.mpowerededucation.com/dashboard.html';
    }
  </script>

  <!-- Tool identity strip -->
  <div class="page-identity-bar">
    <div class="page-identity-inner">
      <div class="w-8 h-8 rounded-[8px] flex items-center justify-center flex-shrink-0" style="background:linear-gradient(135deg,#3b5bdb,#6c8fff);">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </div>
      <div>
        <h1 class="text-[0.95rem] font-bold text-slate-100 tracking-tight leading-none mb-0.5">SDI Scaffold Engine</h1>
        <p class="text-[0.68rem] text-slate-400 leading-none">Specially Designed Instruction &middot; Asset Factory</p>
      </div>
    </div>
  </div>

  <main class="max-w-6xl mx-auto px-6 py-8">
     <!-- ... (your main content remains unchanged) ... -->
  </main>

  <script>
    // ... (your existing scripts) ...
  </script>
</body>
</html>
